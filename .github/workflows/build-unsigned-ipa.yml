name: Build Unsigned IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Show Xcode version
        run: |
          xcodebuild -version
          ls /Applications | grep Xcode || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate project and scheme
        run: xcodebuild -list -project Standawaker.xcodeproj

      - name: Build app (unsigned)
        run: |
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project Standawaker.xcodeproj \
            -scheme Standawaker \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build/xcodebuild.log

      - name: Package IPA
        run: |
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "build/Build/Products/Release-iphoneos/Standawaker.app" "build/Payload/"
          cd build
          /usr/bin/zip -r "Standawaker-unsigned.ipa" "Payload"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Standawaker-unsigned-ipa
          path: build/Standawaker-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/xcodebuild.log
            build/Logs
          if-no-files-found: warn
