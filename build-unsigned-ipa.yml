name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project Standawaker.xcodeproj \
            -scheme Standawaker \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R "build/Build/Products/Release-iphoneos/Standawaker.app" "build/Payload/"
          cd build
          /usr/bin/zip -r "Standawaker-unsigned.ipa" "Payload"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Standawaker-unsigned-ipa
          path: build/Standawaker-unsigned.ipa
          if-no-files-found: error
